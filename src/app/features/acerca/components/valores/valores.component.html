<section class="val">
    <h2 class="val__title">Lo que nos mueve</h2>
    <div class="val__grid">
        @for (valor of valores; track valor.titulo) {
        <article class="val__card">
            <span class="val__icon">
                @switch (valor.icono) {
                @case ('bulb') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path
                        d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z" />
                </svg>
                }
                @case ('school') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M22 9 12 5 2 9l10 4 10-4Z" />
                    <path d="M6 10.6V16c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5.4" />
                </svg>
                }
                @case ('users') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                }
                }
            </span>
            <h4 class="val__card-title">{{ valor.titulo }}</h4>
            <p class="val__card-text">{{ valor.texto }}</p>
        </article>
        }
    </div>
</section>
