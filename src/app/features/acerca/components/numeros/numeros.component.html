<section class="num">
    <div class="num__head">
        <span class="num__eyebrow">
            <span class="num__eyebrow-dot" aria-hidden="true"></span>
            Al aire
        </span>
        <h2 class="num__title">TV Tecno en números</h2>
    </div>
    <div class="num__grid">
        @for (cifra of cifras; track cifra.etiqueta) {
        <div class="num__item">
            <div class="num__valor">{{ cifra.valor }}</div>
            <div class="num__etiqueta">{{ cifra.etiqueta }}</div>
        </div>
        }
    </div>
</section>
