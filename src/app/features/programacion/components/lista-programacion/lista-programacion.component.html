<div class="lista-programacion">
    <div class="lista-programacion__encabezado">
        <div class="lista-programacion__titulo-grupo">
            <span class="lista-programacion__icono">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </span>
            <div class="lista-programacion__texto">
                <h3>Programación de {{ nombreDia }}</h3>
                <p class="lista-programacion__subtitulo">Conoce lo que tenemos preparado para hoy</p>
            </div>
        </div>
        <span class="lista-programacion__total">{{ total }} programas</span>
    </div>

    <div class="lista-programacion__grid">
        <article class="programa-card" *ngFor="let programa of programas"
            [class.programa-card--en-vivo]="programa.enVivo">
            <div class="programa-card__hora">
                <span class="programa-card__hora-inicio">{{ programa.hora }}</span>
                <span class="programa-card__hora-fin">{{ programa.horaFin }}</span>
            </div>

            <div class="programa-card__cuerpo">
                <div class="programa-card__cabecera">
                    <span class="programa-card__badge" [attr.data-categoria]="programa.categoria">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path [attr.d]="iconosCategoria[programa.categoria]"></path>
                        </svg>
                        {{ programa.categoria }}
                    </span>
                    <span class="programa-card__en-vivo" *ngIf="programa.enVivo">
                        <span class="programa-card__en-vivo-punto"></span>
                        En vivo
                    </span>
                </div>

                <h4 class="programa-card__titulo">{{ programa.titulo }}</h4>
                <p class="programa-card__descripcion">{{ programa.descripcion }}</p>
            </div>
        </article>

        <p class="lista-programacion__vacio" *ngIf="total === 0">
            No hay programas registrados para este día.
        </p>
    </div>
</div>
