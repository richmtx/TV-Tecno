<nav class="dias-selector" aria-label="Selector de día">
    <button *ngFor="let dia of dias" class="dias-selector__item"
        [class.dias-selector__item--activo]="dia.index === diaSeleccionado"
        [class.dias-selector__item--hoy]="esDiaActual(dia.index)" (click)="seleccionar(dia.index)" type="button">

        <svg *ngIf="dia.index === diaSeleccionado" class="dias-selector__icono" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>

        <span class="dias-selector__nombre">{{ dia.nombre }}</span>
        <span class="dias-selector__fecha">{{ dia.fecha }}</span>
        <span class="dias-selector__contador">{{ dia.count }}<span class="dias-selector__contador-label">
                programas</span></span>
    </button>
</nav>
