<div class="ticker">
    <div class="ticker__label">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" aria-hidden="true">
            <path d="M4 14a8 8 0 0 1 8-8"></path>
            <path d="M4 9a13 13 0 0 1 13 13"></path>
            <circle cx="5" cy="19" r="1.5"></circle>
        </svg>
        NOTICIAS
    </div>

    <div class="ticker__viewport">
        <div class="ticker__track">
            <!-- Duplicamos el contenido para que el scroll sea continuo -->
            @for (grupo of [1, 2]; track grupo) {
            <div class="ticker__group" [attr.aria-hidden]="grupo === 2 ? 'true' : null">
                @for (noticia of noticias; track noticia) {
                <span class="ticker__item">{{ noticia }}</span>
                <span class="ticker__dot" aria-hidden="true">•</span>
                }
            </div>
            }
        </div>
    </div>
</div>
