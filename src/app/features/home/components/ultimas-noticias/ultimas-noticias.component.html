<section class="noticias">
    <div class="noticias__encabezado">
        <svg class="noticias__icono" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path
                d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2" />
            <path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z" />
        </svg>
        <h2 class="noticias__titulo">Últimas noticias</h2>
    </div>

    <div class="noticias__grid">
        @for (noticia of noticias; track trackByTitulo($index, noticia); let i = $index) {
        <article class="tarjeta">
            <div class="tarjeta__media">
                @if (noticia.imagen) {
                <img [src]="noticia.imagen" [alt]="noticia.titulo" loading="lazy" />
                } @else {
                <div class="tarjeta__fallback" [style.background]="fallbackFor(i)">
                    <span class="tarjeta__brillo" aria-hidden="true"></span>
                    <svg class="tarjeta__placeholder" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.5-3.5a2 2 0 0 0-2.8 0L6 20" />
                    </svg>
                </div>
                }
            </div>

            <div class="tarjeta__cuerpo">
                <span class="tarjeta__categoria">Noticias</span>
                <h3 class="tarjeta__titulo">{{ noticia.titulo }}</h3>
                <p class="tarjeta__descripcion">{{ noticia.descripcion }}</p>

                <div class="tarjeta__pie">
                    <span class="tarjeta__fecha">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                            <path d="M16 2v4M8 2v4M3 10h18" />
                        </svg>
                        {{ noticia.fecha }}
                    </span>

                    <span class="tarjeta__leer-mas" aria-hidden="true">
                        Leer más
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M13 6l6 6-6 6" />
                        </svg>
                    </span>
                </div>
            </div>
        </article>
        }
    </div>
</section>
