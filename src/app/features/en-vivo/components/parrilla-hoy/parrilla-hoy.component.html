<div class="parrilla-wrapper">
    <section class="parrilla">
        <p class="parrilla__titulo">— {{ titulo }} —</p>

        <div class="parrilla__grid">
            <article class="franja" [class.franja--activa]="franja.activa" *ngFor="let franja of franjas">
                <p class="franja__hora">{{ franja.hora }}</p>
                <p class="franja__info">{{ franja.titulo }} · {{ franja.medio }}</p>
            </article>
        </div>
    </section>

    <!-- No te pierdas nada -->
    <div class="recordatorio">
        <span class="recordatorio__icono">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
        </span>

        <div class="recordatorio__texto">
            <p class="recordatorio__titulo">¡No te pierdas nada!</p>
            <p class="recordatorio__sub">Activa recordatorios y entérate cuando inicien tus programas favoritos.</p>
        </div>

        <button class="recordatorio__btn" type="button">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            Activar recordatorios
        </button>
    </div>
</div>
