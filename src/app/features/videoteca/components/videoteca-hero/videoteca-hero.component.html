<section class="videoteca-hero">
    <div class="videoteca-hero__card">
        <h1 class="videoteca-hero__title">Videoteca</h1>
        <p class="videoteca-hero__subtitle">Explora, aprende y revive nuestro contenido.</p>
        <p class="videoteca-hero__lead">Accede a todos nuestros programas, entrevistas, coberturas<br
                class="videoteca-hero__lead-salto"> y producciones cuando quieras y desde cualquier
            dispositivo.</p>

        <form class="videoteca-hero__buscador" (submit)="onBuscar($event, campoBusqueda.value)">
            <label for="videoteca-hero-busqueda" class="videoteca-hero__buscador-label">Buscar en la
                videoteca</label>

            <svg class="videoteca-hero__buscador-icono" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>

            <input #campoBusqueda id="videoteca-hero-busqueda" class="videoteca-hero__buscador-input" type="search"
                name="busqueda" placeholder="Buscar videos, programas, temas..." autocomplete="off">

            <button type="submit" class="videoteca-hero__buscador-boton">Buscar</button>
        </form>
    </div>
</section>
