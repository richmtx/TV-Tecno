<section class="hero-galeria">
    <div class="hero-galeria__container">

        <!-- Lado izquierdo: texto + estadísticas -->
        <div class="hero-galeria__left">
            <h1 class="hero-galeria__title">Galería ITD</h1>

            <p class="hero-galeria__description">
                Un recorrido visual por nuestra historia, crecimiento y comunidad.
                Revive los momentos más importantes y conoce nuestras instalaciones
                a través del tiempo.
            </p>

            <div class="hero-galeria__stats">
                <!-- Stat: Fotos -->
                <div class="hero-galeria__stat">
                    <span class="hero-galeria__stat-icon">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path
                                d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                    </span>
                    <div class="hero-galeria__stat-text">
                        <span class="hero-galeria__stat-number">1,248</span>
                        <span class="hero-galeria__stat-label">Fotos</span>
                    </div>
                </div>

                <!-- Stat: Años de historia -->
                <div class="hero-galeria__stat">
                    <span class="hero-galeria__stat-icon">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                    </span>
                    <div class="hero-galeria__stat-text">
                        <span class="hero-galeria__stat-number">78+</span>
                        <span class="hero-galeria__stat-label">Años de historia</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lado derecho: rejilla de imágenes -->
        <div class="hero-galeria__gallery">
            <div class="hero-galeria__img-wrapper hero-galeria__img-wrapper--1">
                <img ngSrc="assets/galeria/Escolta.png" fill priority alt="Estudiantes históricos del ITD" />
            </div>
            <div class="hero-galeria__img-wrapper hero-galeria__img-wrapper--2">
                <img ngSrc="assets/galeria/Front.png" fill priority alt="Vista aérea del campus del ITD" />
            </div>
            <div class="hero-galeria__img-wrapper hero-galeria__img-wrapper--3">
                <img ngSrc="assets/galeria/Totem2.png" fill priority alt="Edificio principal del ITD" />
            </div>
            <div class="hero-galeria__img-wrapper hero-galeria__img-wrapper--4">
                <img ngSrc="assets/galeria/EstudiantesLab.png" fill priority alt="Estudiantes del ITD en laboratorio" />
            </div>
        </div>

    </div>
</section>
